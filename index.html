<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="icon" type="image/png" href="assets/icono.ico">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="container-cortinas" class="container-cortinas">
        <div class="cortinas cort-izq">
            <img src="assets/izq.png" class="img-fluid" alt="reloj">
        </div>
        <div class="cortinas cort-der">
            <img src="assets/der.png" class="img-fluid" alt="reloj">
        </div>
    </div>
    <div class="container-fluid vh-100 p-0 d-flex flex-column overflow-hidden">
        <div class="row m-4" style=" height: 10%;">
            <div class="col  d-flex flex-column align-items-center justify-content-center">
                <img src="assets/title.png" class="img-fluid w-50" alt="ttulo">
            </div>
        </div>
        <div class="row m-0 flex-grow-1">
            <div class="col d-flex flex-column align-items-center justify-content-start gap-4 pt-4">
                <div style="width: 5vw;">
                    <img src="assets/reloj2.gif" class="img-fluid" alt="reloj">
                </div>
                <div style="width: 15vw; margin-left: -45%;">
                    <img src="assets/gusano3.gif" class="img-fluid" alt="gusano">
                </div>
                <div style="width: 20vw; margin-left: -14%;">
                    <img src="assets/tostadora.gif" class="img-fluid w-75" alt="tostadora">
                </div>
                <div style="width: 7vw; margin-right: -10vw; margin-top: -10%; z-index: 1;">
                    <img src="assets/campana.gif" class="img-fluid" alt="campana">
                </div>
                <div style="margin-top: -3vw;">
                    <img src="assets/gusano.gif" class="img-fluid w-75" alt="gusano">
                </div>
            </div>
            <div class="col d-flex flex-column align-items-center justify-content-start gap-4 pt-4">
                <div style="width: 15vw; margin-top: 25%;">
                    <img src="assets/tostadora2.gif" class="img-fluid w-50" alt="tostadora">
                </div>
                <div style="margin-left: -50%; width: 12vw">
                    <img src="assets/boca.gif" class="img-fluid" alt="boca">
                </div>
                <div style="margin-left: 8vw; width: 6vw;">
                    <img src="assets/reloj.gif" class="img-fluid" alt="reloj">
                </div>
                <div>
                    <img src="assets/gusano2.gif" class="img-fluid w-75" alt="gusano">
                </div>
            </div>
            <div class="col d-flex flex-column align-items-center justify-content-start pt-4">
                <div style="margin-top: 2vh; width: 17vw;">
                    <img src="assets/jesus.gif" class="img-fluid" alt="reloj">
                </div>
                <audio id="audio" loop>
                    <source src="assets/sound.mp3" type="audio/mpeg">
                </audio>
                <button id="btn-sonido" class="btn fw-bold w-75">
                    <i id="icono-sonido" class="bi bi-volume-up-fill"></i>
                    <span id="texto" style="background-color: transparent;">Play sound</span>
                </button>
            </div>
            <div class="col d-flex flex-column align-items-center justify-content-start gap-4 pt-4">
                <div style="margin-top: 20%;">
                    <img src="assets/gusano.gif" class="img-fluid w-75" alt="gusano">
                </div>
                <div style="width: 10vw;">
                    <img src=" assets/campana2.gif" class="img-fluid w-75" alt="campana">
                </div>
                <div>
                    <img src="assets/tostadora.gif" class="img-fluid w-100" alt="tostadora">
                </div>
            </div>
            <div class="col d-flex flex-column align-items-center justify-content-start gap-4 pt-4">
                <div style="margin-top: 10%;">
                    <img src="assets/tostadora2.gif" class="img-fluid w-50" alt="tostadora">
                </div>
                <div>
                    <img src="assets/boca2.gif" class="img-fluid w-75" alt="boca">
                </div>
                <div style="margin-top: 15%; width: 5vw;">
                    <img src="assets/reloj2.gif" class="img-fluid" alt="reloj">
                </div>
            </div>
        </div>
    </div>
</body>
